<!DOCTYPE html>
<html>
<head>
<title>Student Admission</title>
</head>

<body>

<form name="f" style="width:220px;margin:auto;border:1px solid gray;padding:10px">

Name <br>
<input type="text" name="name"><br><br>

Email <br>
<input type="text" name="email"><br><br>

Address <br>
<textarea name="address"></textarea><br><br>

Course <br>
<select name="course">
<option value="">Select Course</option>
<option>CSE</option>
<option>BBA</option>
<option>MBA</option>
</select><br><br>

Sex <br>
Male <input type="radio" name="sex" value="Male">
Female <input type="radio" name="sex" value="Female"><br><br>

Subject <br>
English <input type="checkbox" name="sub" value="English">
Bengali <input type="checkbox" name="sub" value="Bengali">
Math <input type="checkbox" name="sub" value="Math"><br><br>

<input type="button" value="Submit" onclick="showData()">
<input type="reset" value="Reset">

</form>

<script>

function showData(){

let name=document.f.name.value.trim();
let email=document.f.email.value.trim();
let address=document.f.address.value.trim();
let course=document.f.course.value;

let sex="";
let subject="";


// Name validation
if(name==""){
alert("Name is required");
return;
}

// Email validation
let emailPattern=/^\S+@\S+\.\S+$/;

if(!emailPattern.test(email)){
alert("Enter valid email");
return;
}


// Address validation
if(address==""){
alert("Address required");
return;
}


// Course validation
if(course==""){
alert("Select a course");
return;
}


// Sex
for(let i=0;i<document.f.sex.length;i++){
if(document.f.sex[i].checked){
sex=document.f.sex[i].value;
}
}

if(sex==""){
alert("Select sex");
return;
}


// Subjects
for(let j=0;j<document.f.sub.length;j++){
if(document.f.sub[j].checked){
subject+=document.f.sub[j].value+" ";
}
}

if(subject==""){
alert("Select at least one subject");
return;
}


// Popup window
let w=window.open("","","width=350,height=350");

w.document.write("<h3>Student Information</h3>");
w.document.write("Name: "+name+"<br>");
w.document.write("Email: "+email+"<br>");
w.document.write("Address: "+address+"<br>");
w.document.write("Course: "+course+"<br>");
w.document.write("Sex: "+sex+"<br>");
w.document.write("Subject: "+subject+"<br><br>");

w.document.write("<button onclick='window.print()'>Print</button> ");
w.document.write("<button onclick='window.close()'>Close</button>");

}

</script>

</body>
</html>
